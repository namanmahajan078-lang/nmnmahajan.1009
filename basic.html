<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic | Naman Lab</title>
    <style>
        :root { --accent: #00d4ff; }
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }
        .bg-glow {
            position: absolute; width: 400px; height: 400px; background: var(--accent);
            filter: blur(150px); opacity: 0.2; z-index: -1; border-radius: 50%;
        }
        .nav-tabs { position: fixed; top: 30px; display: flex; gap: 20px; background: rgba(255,255,255,0.05); padding: 10px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .nav-tabs a { color: white; text-decoration: none; font-size: 0.8rem; opacity: 0.7; font-weight: bold; transition: 0.3s; }
        .nav-tabs a:hover { opacity: 1; color: var(--accent); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px; border-radius: 40px; text-align: center; backdrop-filter: blur(25px);
            max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 10px; }
        .price { font-size: 4.5rem; font-weight: 900; margin: 15px 0; text-shadow: 0 0 20px rgba(0,212,255,0.3); }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .btn { padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .btn-fiverr { background: #1dbf73; color: white; }
        .btn-dm { background: white; color: black; }
        .btn-lab { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #aaa; }
        .btn:hover { transform: scale(1.03); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="nav-tabs">
        <a href="#">TWITTER</a> <a href="https://instagram.com/namann.1009">INSTAGRAM</a> <a href="#">EMAIL</a>
    </div>
    <div class="glass-card">
        <h1>BASIC</h1>
        <p style="color: #888;">Essential writing for high-impact social announcements.</p>
        <div class="price">$10</div>
        <p>300 Words • 48hr Delivery</p>
        <div class="btn-group">
            <a href="https://fiverr.com/your-link" class="btn btn-fiverr">Go To Fiverr</a>
            <a href="https://instagram.com/namann.1009" class="btn btn-dm">DM For More Inquiry</a>
            <a href="index.html" class="btn btn-lab">Return to Lab</a>
        </div>
    </div>
</body>
</html>
